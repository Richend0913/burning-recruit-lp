<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>og-template — burning-recruit-lp (1200x630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
 body{margin:0;background:#333}
 .og{width:1200px;height:630px;position:relative;overflow:hidden;box-sizing:border-box;
   background:linear-gradient(160deg,#20242c,#0f1013);font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;color:#f2efe9;
   display:flex;flex-direction:column;justify-content:center;padding:0 96px}
 .og::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 80% 0%,rgba(224,138,43,.16),transparent 60%)}
 .eyebrow{position:relative;z-index:1;color:#e08a2b;font-size:25px;font-weight:700;letter-spacing:.16em;
   display:flex;align-items:center;gap:18px;margin-bottom:34px}
 .eyebrow::before{content:"";width:44px;height:2px;background:currentColor;opacity:.7}
 h1{position:relative;z-index:1;margin:0;font-size:70px;font-weight:900;line-height:1.32;
   letter-spacing:.02em;font-feature-settings:"palt"}
 h1 .ph{display:inline-block}
 h1 .hl{background:linear-gradient(transparent 62%,rgba(224,138,43,.28) 62%);padding:0 .05em;color:#e08a2b}
 .sub{position:relative;z-index:1;margin-top:32px;font-size:29px;font-weight:500;color:#c8c3ba;letter-spacing:.03em}
 .brand{position:absolute;right:52px;bottom:38px;z-index:1;font-size:23px;font-weight:700;color:#c6a06a;letter-spacing:.08em}
</style></head><body>
<div class="og">
  <div class="eyebrow">採用支援 ／ BURNING RECRUIT</div>
  <h1><span class="ph">紹介会社に50万払う前に、</span><br><span class="ph"><span class="hl">応募が来る仕組み</span>を月額で。</span></h1>
  <div class="sub">正直な採用LP＋24時間AI応募受付＋月次レポート</div>
  <div class="brand">NEXT GROWTH ／ BURNING BROS.</div>
</div></body></html>
